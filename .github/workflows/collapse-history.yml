name: collapse-history

on:
  workflow_run:
    workflows: [post-deploy-verify]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: collapse-history-main
  cancel-in-progress: false

jobs:
  collapse:
    name: Collapse history to single commit
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Check collapse target
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          echo "should_collapse=true" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" != "workflow_run" ]; then
            exit 0
          fi

          current_sha="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$current_sha" != "$EXPECTED_SHA" ]; then
            echo "post-deploy-verify was for $EXPECTED_SHA, but main is $current_sha; skipping stale collapse."
            echo "should_collapse=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Delete workflow run history
        if: steps.target.outputs.should_collapse == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CV_HISTORY_COLLAPSE_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          echo "Deleting completed workflow run history for $REPO"
          deleted=0
          max_deleted=2000

          while true; do
            if [ "$deleted" -ge "$max_deleted" ]; then
              echo "Reached max_deleted=$max_deleted; stopping cleanup loop."
              break
            fi

            json="$(gh api "repos/$REPO/actions/runs?per_page=100&page=1")"
            ids="$(echo "$json" | jq -r --arg current "$CURRENT_RUN_ID" '.workflow_runs[] | select(.status == "completed" and (.id | tostring) != $current) | .id')"

            if [ -z "$ids" ]; then
              echo "No more completed runs to delete."
              break
            fi

            while IFS= read -r id; do
              [ -z "$id" ] && continue

              if [ "$deleted" -ge "$max_deleted" ]; then
                echo "Reached max_deleted=$max_deleted; stopping cleanup loop."
                break 2
              fi

              echo "DELETE run $id"
              gh api -X DELETE "repos/$REPO/actions/runs/$id" >/dev/null
              deleted=$((deleted + 1))
              sleep 0.2
            done <<< "$ids"
          done

          echo "Done. Deleted completed runs: $deleted"

      - name: Collapse history to single commit
        if: steps.target.outputs.should_collapse == 'true'
        shell: bash
        env:
          GIT_AUTHOR_NAME: History Collapser
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: History Collapser
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          set -euo pipefail

          base_sha="$(git rev-parse HEAD)"
          count="$(git rev-list --count --max-count=2 HEAD)"
          if [ "$count" -le 1 ]; then
            echo "Repository already reduced to a single commit; nothing to do."
            exit 0
          fi

          echo "Current branch has multiple commits; rewriting history to a single commit."

          snapshot_message="Publish current CV state [skip ci]"
          git checkout --orphan _collapsed_tmp
          git add -A
          git commit -m "${snapshot_message}" -m "skip-checks:true"
          git push origin HEAD:main --force-with-lease=refs/heads/main:"$base_sha"
